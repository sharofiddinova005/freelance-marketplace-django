<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Freelance Platform | Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f0f2f5; overflow-x: hidden; }
        .sidebar { width: 280px; height: 100vh; position: fixed; background: #fff; border-right: 1px solid #ddd; padding: 20px; }
        .main-content { margin-left: 280px; padding: 30px; }
        .nav-link { color: #333; border-radius: 8px; margin-bottom: 5px; }
        .nav-link:hover, .nav-link.active { background: #0d6efd; color: #fff !important; }
        .role-header { font-size: 0.8rem; text-transform: uppercase; color: #888; margin-top: 20px; margin-bottom: 10px; font-weight: bold; }
        .chat-box { height: 300px; overflow-y: auto; background: #e9ecef; border-radius: 10px; padding: 15px; }
    </style>
</head>
<body>

<div class="sidebar d-flex flex-column shadow-sm">
    <h3 class="fw-bold text-primary mb-4 text-center">FreelanceUz</h3>

    <div class="role-header text-muted small fw-bold mt-2">Freelancer Bo'limi</div>
    <nav class="nav flex-column">
        <a class="nav-link {% if request.resolver_match.url_name == 'project_list' %}active{% endif %}" href="{% url 'project_list' %}">
            <i class="bi bi-briefcase me-2"></i>Loyihalar izlash

        <a class="nav-link" href="{% url 'profile' %}"><i class="bi bi-person me-2"></i>Profil</a>

    <div class="role-header text-muted small fw-bold mt-4">Client (Buyurtmachi)</div>
    <nav class="nav flex-column">
        <a class="nav-link" href="{% url 'create_project' %}">
            <i class="bi bi-plus-circle me-2"></i>Loyiha e'lon qilish
        </a>
        <a class="nav-link" href="{% url 'my_projects' %}">
            <i class="bi bi-file-earmark-text me-2"></i>Mening loyihalarim
        </a>
        <a class="nav-link" href="{% url 'contract_list' %}">
            <i class="bi bi-check-circle me-2"></i>Shartnomalar
        </a>
    </nav>

    <div class="role-header text-muted small fw-bold mt-4">Xabarlar</div>
    <nav class="nav flex-column mb-4">
        <a class="nav-link text-info" href="https://t.me/your_bot_user" target="_blank">
            <i class="bi bi-telegram me-2"></i>Telegram Bot
        </a>
    </nav>

    <div class="mt-auto">
        <hr>
        <a href="/admin" class="btn btn-outline-dark w-100 py-2">
            <i class="bi bi-shield-lock me-2"></i>Admin Panel
        </a>
    </div>
</div>

<div class="main-content">
    {% block content %}{% endblock %}
</div>
